# [jeykyll config file]
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
title: yatharthx
email: yatharth@hey.com
description: a general purpose programmer
baseurl: "" # the subpath for the site, e.g. /blog
domain: "yatharthx.github.io"
url: "https://yatharthx.github.io" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: yatharthx_
github_username: yatharthx

# Header navigation (order: left to right)
header_pages:
  - weblog.md
  - writings.md
  - recommendations.html

# Build settings
plugins:
  - jekyll-feed
  - jekyll-seo-tag

collections:
  writings:
    output: true
    permalink: /writings/:slug/
  logs:
    output: true
    permalink: /weblog/:slug/
  recommendations:
    output: true
    permalink: /recommendations/:slug/

defaults:
  - scope:
      path: "_writings"
    values:
      layout: post
  - scope:
      path: "_logs"
    values:
      layout: post
